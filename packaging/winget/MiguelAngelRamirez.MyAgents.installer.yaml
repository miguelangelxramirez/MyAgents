    InstallerUrl: https://github.com/miguelangelxramirez/MyAgents/releases/download/v0.1.1/MyAgents.exe
    InstallerSha256: 7E3D544A825C4E727EA03177E7BEA156BBA77AF0865B88D24F2AD636F53B14DB
ManifestType: installer
ManifestVersion: 1.6.0
