name: MyAgentsMac
options:
  bundleIdPrefix: com.miguelangelramirez.myagents
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: 2BYX29N42C
    CODE_SIGN_STYLE: Automatic
    SWIFT_EMIT_LOC_STRINGS: YES
  # Debug stays on Automatic (Xcode picks an Apple Development/ad-hoc identity from whatever
  # account is logged in) so local builds/tests never depend on the Developer ID cert. Release
  # is pinned to manual Developer ID signing — this is the ONLY configuration `build-release.sh`
  # (see mac/scripts/build-release.sh) ever archives/exports, and it's also what HITO 3's ad-hoc
  # verification build overrides on the CLI (CODE_SIGNING_ALLOWED=NO) to prove Release compiles
  # without requiring Miguel's not-yet-created "Developer ID Application" certificate.
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application"
      OTHER_CODE_SIGN_FLAGS: "--timestamp"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.4

targets:
  MyAgentsMacCore:
    type: framework
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/MyAgentsMacCore
      # The 4 Node scripts a running hook actually requires at runtime (mirrors the `FILES`
      # array in ../hooks/install.js). `install.js`/`uninstall.js`/`install-codex.js` are the
      # standalone fallback entry points — not bundled, since no hook invokes them directly.
      # `HookInstaller` copies these into ~/.claude/statusbar/ at install time.
      # NOTE: XcodeGen targets have no top-level `resources:` key (a prior version of this file
      # used one — it silently no-ops); resources are `sources:` entries with `buildPhase: resources`.
      - path: ../hooks/_common.js
        buildPhase: resources
        group: Hooks
      - path: ../hooks/update.js
        buildPhase: resources
        group: Hooks
      - path: ../hooks/lifecycle.js
        buildPhase: resources
        group: Hooks
      - path: ../hooks/statusline.js
        buildPhase: resources
        group: Hooks
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miguelangelramirez.myagents.mac.core
        PRODUCT_NAME: MyAgentsMacCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  MyAgentsMac:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/MyAgentsMac
      # Fixed alongside the Core scripts above: same `resources:` no-op affected this file too
      # (it was silently never copied into the app bundle since Hito 0/Round 1).
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
      # Asset catalog (AppIcon) — XcodeGen recognizes `.xcassets` and puts it in the resources
      # build phase automatically regardless of `buildPhase:` (unlike plain files above).
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miguelangelramirez.myagents.mac
        PRODUCT_NAME: MyAgentsMac
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - target: MyAgentsMacCore
        embed: true
      # Sparkle auto-update (for users who install the .zip directly rather than via Homebrew).
      # No XPC services / entitlements needed because this app is NOT sandboxed (CONTEXT.md D5) —
      # the standard SPM integration works as-is under hardened runtime + notarization.
      - package: Sparkle

  MyAgentsMacCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/MyAgentsMacCoreTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miguelangelramirez.myagents.mac.core.tests
        GENERATE_INFOPLIST_FILE: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @loader_path/../Frameworks @loader_path/Frameworks"
    dependencies:
      - target: MyAgentsMacCore
        embed: true

schemes:
  MyAgentsMac:
    build:
      targets:
        MyAgentsMac: all
        MyAgentsMacCoreTests: [test]
    test:
      targets:
        - MyAgentsMacCoreTests
    run:
      config: Debug
    archive:
      config: Release
